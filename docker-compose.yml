services:
  postgres:
    image: postgres:16
    container_name: epos-postgres
    environment:
      POSTGRES_USER: epos
      POSTGRES_PASSWORD: epos
      POSTGRES_DB: epos_master
    ports:
      - "5432:5432"
    volumes:
      - epos_pg_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=300"]
    shm_size: "256mb"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: epos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  epos_pg_data:
